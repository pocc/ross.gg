baseURL = "https://ross.gg/"
title = "Ross Jacobs"
languageCode = "en-US"
enableRobotsTXT = true
enableEmoji = true
enableGitInfo = true
buildDrafts = false

[pagination]
pagerSize = 10

[outputs]
home = ["HTML", "RSS", "JSON"]

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions]
    footnote = true
    strikethrough = true
    table = true
    taskList = true
  [markup.highlight]
    style = "dracula"
    lineNos = true
    lineNumbersInTable = true
    guessSyntax = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[[menus.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 10

[[menus.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 20

[[menus.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 30

[params]
env = "production"
description = "Ross Jacobs — networking, protocols, board games, tea, and building things with code."
author = "Ross Jacobs"
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowToc = true
TocOpen = false

  [params.profileMode]
  enabled = true
  title = "Ross Jacobs"
  subtitle = "Customer Solutions Engineer · Digital Gardener"
  imageUrl = "/img/profile_pic_eff.jpg"
  imageWidth = 160
  imageHeight = 160

    [[params.profileMode.buttons]]
    name = "Posts"
    url = "/posts/"

    [[params.profileMode.buttons]]
    name = "About"
    url = "/about/"

  [[params.socialIcons]]
  name = "github"
  url = "https://github.com/pocc"

  [[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/rossbjacobs/"

  [[params.socialIcons]]
  name = "stackoverflow"
  url = "https://stackoverflow.com/users/1596750/ross-jacobs"

  [[params.socialIcons]]
  name = "email"
  url = "mailto:rj@swit.sh"

  [[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

  [params.assets]
  favicon = "/favicon.ico"
  favicon16x16 = "/favicon-16x16.png"
  favicon32x32 = "/favicon-32x32.png"
  apple_touch_icon = "/apple-touch-icon.png"

  [params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]
